name: Build BlackChain Node

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build BlackChain Node
        run: |
          mkdir -p build
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -o build/blackchain-node-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: blackchain-node-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/
