name: Build BlackChain Node

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build BlackChain Node
        run: |
          mkdir -p build
          GOOS=linux GOARCH=${{ matrix.arch }} \
          go build -o build/blackchain-node-linux-${{ matrix.arch }} ./cmd/blackchain-node

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: blackchain-node-linux-${{ matrix.arch }}
          path: build/
