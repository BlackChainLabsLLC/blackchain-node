name: Build BlackChain Node

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p build

          GOOS=linux GOARCH=${{ matrix.arch }} go build -o build/blacknetd-linux-${{ matrix.arch }} ./cmd/blacknetd
          GOOS=linux GOARCH=${{ matrix.arch }} go build -o build/blackctl-linux-${{ matrix.arch }} ./cmd/blackctl
          GOOS=linux GOARCH=${{ matrix.arch }} go build -o build/signtx-linux-${{ matrix.arch }} ./cmd/signtx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blackchain-binaries-${{ matrix.arch }}
          path: build/
